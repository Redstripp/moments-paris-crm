<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moment's Paris — Loja</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e2c47e;
      --gold-dark: #8b6914;
      --gold-glow: rgba(201,168,76,0.15);
      --bg-base: #0a0a0a;
      --bg-surface: #111111;
      --bg-raised: #181818;
      --bg-overlay: #202020;
      --text-primary: #f5edd8;
      --text-secondary: #9a8f7a;
      --text-muted: #5c554a;
      --border-subtle: rgba(201,168,76,0.1);
      --border-default: rgba(201,168,76,0.2);
      --border-strong: rgba(201,168,76,0.45);
      --danger: #c0392b;
      --success: #27ae60;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --shadow-md: 0 4px 20px rgba(0,0,0,0.5);
      --shadow-gold: 0 4px 24px rgba(201,168,76,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── TELA DE AUTH ── */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--gold-light);
      letter-spacing: 0.15em;
    }
    .auth-logo p {
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 4px;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .auth-tab.is-active {
      background: var(--gold);
      color: #000;
    }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 10px 13px;
      color: var(--text-primary);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input.is-error { border-color: var(--danger); }
    .form-error {
      font-size: 11px;
      color: var(--danger);
      margin-top: 4px;
      display: block;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 20px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      width: 100%;
    }
    .btn--primary {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #000;
    }
    .btn--primary:hover { opacity: 0.9; }
    .btn--secondary {
      background: var(--bg-raised);
      color: var(--text-secondary);
      border: 1px solid var(--border-default);
    }
    .btn--danger {
      background: rgba(192,57,43,0.1);
      color: var(--danger);
      border: 1px solid rgba(192,57,43,0.25);
    }
    .auth-msg {
      font-size: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      margin-bottom: 14px;
      text-align: center;
      display: none;
    }
    .auth-msg--error { background: rgba(192,57,43,0.1); color: var(--danger); border: 1px solid rgba(192,57,43,0.2); }
    .auth-msg--success { background: rgba(39,174,96,0.1); color: var(--success); border: 1px solid rgba(39,174,96,0.2); }

    /* ── LOJA ── */
    .loja-wrap { display: none; min-height: 100vh; flex-direction: column; }
    .loja-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .loja-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.1em;
      flex: 1;
      min-width: 120px;
    }
    .loja-user {
      font-size: 11px;
      color: var(--text-muted);
      display: none;
    }
    .loja-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .carrinho-btn {
      position: relative;
      background: var(--bg-raised);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 8px 14px;
      color: var(--text-primary);
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .carrinho-btn:hover { border-color: var(--gold); color: var(--gold); }
    .carrinho-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--gold);
      color: #000;
      font-size: 9px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loja-body { flex: 1; padding: 28px 32px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .produtos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    .produto-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all 0.2s;
    }
    .produto-card:hover { border-color: var(--border-default); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .produto-card__img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--bg-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 40px;
    }
    .produto-card__img img { width: 100%; height: 100%; object-fit: cover; }
    .produto-card__body { padding: 16px; }
    .produto-card__nome {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .produto-card__desc {
      font-size: 11.5px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .produto-card__preco {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .btn--add {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }
    .btn--add:hover { opacity: 0.85; }

    .produto-qty-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .produto-qty-control .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border-default);
      background: var(--bg-overlay);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .produto-qty-control .qty-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .produto-qty-num {
      font-size: 14px;
      font-weight: 600;
      min-width: 24px;
      text-align: center;
    }

    .produto-qty-label {
      font-size: 11px;
      color: var(--text-muted);
      flex: 1;
    }

    /* ── CARRINHO MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.is-open { display: flex; }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    }
    .modal__header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
    }
    .modal__close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .modal__body { padding: 20px 24px; overflow-y: auto; flex: 1; }
    .modal__footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 10px;
      background: var(--bg-raised);
    }
    .carrinho-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .carrinho-item:last-child { border-bottom: none; }
    .carrinho-item__foto {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .carrinho-item__foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .carrinho-item__nome { font-size: 13px; font-weight: 500; }
    .carrinho-item__preco { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .qty-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border-default);
      background: var(--bg-overlay);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .qty-btn:hover { border-color: var(--gold); color: var(--gold); }
    .qty-num { font-size: 13px; font-weight: 600; min-width: 20px; text-align: center; }
    .carrinho-total {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold);
      text-align: right;
      padding: 12px 0 0;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── CONFIRMAÇÃO ── */
    .confirm-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 13px;
    }
    .confirm-item:last-child { border-bottom: none; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .logout-btn {
      background: none;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 7px 12px;
      color: var(--text-muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    #buscaProdutos:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    #buscaProdutos::placeholder {
      color: var(--text-muted);
    }

    .historico-item {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .historico-item__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border-subtle);
      flex-wrap: wrap;
      gap: 8px;
    }

    .historico-item__data {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .historico-item__total {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      color: var(--gold);
    }

    .historico-item__status {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid;
    }

    .historico-item__body {
      padding: 12px 16px;
    }

    .historico-item__linha {
      display: flex;
      justify-content: space-between;
      font-size: 12.5px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .historico-item__linha:last-child {
      border-bottom: none;
    }

    @media (max-width: 600px) {
      /* Body */
      .loja-body { padding: 16px; }

      /* Produtos */
      .produtos-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .produto-card__img { height: 150px; }
      .produto-card__nome { font-size: 12px; }
      .produto-card__preco { font-size: 18px; }

      /* Auth */
      .auth-card { padding: 24px 18px; }

      /* Modais */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal {
        max-width: 100%;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        max-height: 92vh;
      }

      /* Carrinho */
      .carrinho-item { gap: 8px; }
      .carrinho-item__nome { font-size: 12px; }

      /* Footer dos modais */
      .modal__footer { flex-direction: column; }
      .modal__footer .btn { width: 100%; }

      /* Histórico */
      .historico-item__header { flex-direction: column; align-items: flex-start; }
      .historico-item__total { font-size: 18px; }
    }

    @media (max-width: 380px) {
      /* Telas muito pequenas */
      .produtos-grid { grid-template-columns: 1fr; }
      .loja-header h1 { font-size: 16px; }
      .logout-btn { font-size: 10px; padding: 6px 8px; }
    }
  </style>
</head>
<body>

<!-- ── TELA DE AUTH ── -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>MOMENT'S</h1>
      <p>Paris · Loja</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab is-active" onclick="Auth.showTab('login')">Entrar</button>
      <button class="auth-tab" onclick="Auth.showTab('cadastro')">Criar Conta</button>
    </div>
    <div id="authMsg" class="auth-msg"></div>

    <!-- LOGIN -->
    <div id="formLogin">
      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input class="form-input" id="loginTel" type="tel" placeholder="(87) 99999-9999" oninput="formatPhone(this)"/>
        <span class="form-error" id="errLoginTel"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="loginSenha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') Auth.login()"/>
      </div>
      <button class="btn btn--primary" onclick="Auth.login()">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="formCadastro" style="display:none">
      <div class="form-group">
        <label class="form-label">Nome completo</label>
        <input class="form-input" id="cadNome" type="text" placeholder="Seu nome"/>
        <span class="form-error" id="errCadNome"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input class="form-input" id="cadTel" type="tel" placeholder="(87) 99999-9999" oninput="formatPhone(this)"/>
        <span class="form-error" id="errCadTel"></span>
      </div>
      <div class="form-group">
  <label class="form-label">Endereço</label>
  <input class="form-input" id="cadEnd" type="text" placeholder="Rua, número, bairro"/>
  <span class="form-error" id="errCadEnd"></span>
</div>
<div class="form-group">
  <label class="form-label">ID da Empresa</label>
  <input class="form-input" id="cadEmpresa" type="text" placeholder="ID da sua empresa"/>
</div>
<div class="form-group">
  <label class="form-label">CPF — 3 primeiros dígitos</label>
  <input class="form-input" id="cadCpf" type="text" placeholder="Ex: 123" maxlength="3" oninput="this.value=this.value.replace(/\D/g,'')"/>
  <span class="form-error" id="errCadCpf"></span>
</div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="cadSenha" type="password" placeholder="Mínimo 6 caracteres"/>
        <span class="form-error" id="errCadSenha"></span>
      </div>
      <button class="btn btn--primary" onclick="Auth.cadastrar()">Criar Conta</button>
    </div>
  </div>
</div>

<!-- ── LOJA ── -->
<div class="loja-wrap" id="lojaWrap">
  <header class="loja-header">
    <h1>Moment's Paris</h1>
    <span class="loja-user" id="lojaUser"></span>
    <button class="carrinho-btn" onclick="Carrinho.abrir()">
      🛍️ Carrinho
      <span class="carrinho-badge" id="carrinhoBadge">0</span>
    </button>
    <div class="loja-header-actions">
      <button class="logout-btn" onclick="Historico.abrir()">📋 Meus Pedidos</button>
      <button class="logout-btn" onclick="Auth.logout()">Sair</button>
    </div>
  </header>
  <div class="loja-body">
    <div style="margin-bottom:20px;display:flex;gap:10px;align-items:center;">
      <select
        id="filtroCategorias"
        onchange="Produtos.filtrarCategoria(this.value)"
        style="padding:12px 14px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:var(--bg-raised);color:var(--text-primary);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;cursor:pointer;flex-shrink:0;"
      >
        <option value="">Todas as categorias</option>
      </select>
      <input
        type="text"
        id="buscaProdutos"
        placeholder="🔍 Buscar produto..."
        oninput="Produtos.buscar(this.value)"
        style="flex:1;padding:12px 16px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:var(--bg-raised);color:var(--text-primary);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;"
      />
    </div>
    <div class="produtos-grid" id="produtosGrid">
      <div class="empty-state">Carregando produtos...</div>
    </div>
  </div>
</div>

<!-- ── MODAL: CARRINHO ── -->
<div class="modal-overlay" id="modalCarrinho">
  <div class="modal">
    <div class="modal__header">
      <span class="modal__title">🛍️ Meu Carrinho</span>
      <button class="modal__close" onclick="Carrinho.fechar()">✕</button>
    </div>
    <div class="modal__body" id="carrinhoBody"></div>
    <div class="modal__footer">
      <button class="btn btn--secondary" style="width:auto;padding:10px 16px" onclick="Carrinho.fechar()">Continuar</button>
      <button class="btn btn--primary" onclick="Carrinho.finalizar()">Finalizar Pedido →</button>
    </div>
  </div>
</div>

  <!-- ── MODAL: HISTÓRICO DE PEDIDOS ── -->
<div class="modal-overlay" id="modalHistorico">
  <div class="modal">
    <div class="modal__header">
      <span class="modal__title">📋 Meus Pedidos</span>
      <button class="modal__close" onclick="Historico.fechar()">✕</button>

<script>
'use strict';

const SUPABASE_URL = 'https://aacgzwbypqwcyiotnalj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QxVdjp_ZTVDs5qw5kBrr5w_BakfSbR3';

const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: false,
    storage: window.localStorage,
  }
});

let _cliente = null;
let _carrinho = [];

// ── UTILITÁRIOS ──
function formatPhone(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
  else if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d*)$/, '($1) $2-$3');
  else if (v.length > 2) v = v.replace(/^(\d{2})(\d*)$/, '($1) $2');
  input.value = v;
}

function validarTelefone(tel) {
  const digits = tel.replace(/\D/g, '');
  return digits.length >= 10 && digits.length <= 11;
}

  const RateLimit = (() => {
  const MAX_TENTATIVAS = 3;
  const BLOQUEIO_MS = 20 * 60 * 1000; // 20 minutos

  function _chave(tel) {
    return `rate_limit_${tel}`;
  }

  function _getDados(tel) {
    try {
      const raw = localStorage.getItem(_chave(tel));
      return raw ? JSON.parse(raw) : { tentativas: 0, bloqueadoAte: null };
    } catch {
      return { tentativas: 0, bloqueadoAte: null };
    }
  }

  function _salvar(tel, dados) {
    localStorage.setItem(_chave(tel), JSON.stringify(dados));
  }

  function estaBloqueado(tel) {
    const dados = _getDados(tel);
    if (!dados.bloqueadoAte) return false;
    if (Date.now() < dados.bloqueadoAte) return true;
    // Bloqueio expirou — limpa
    _salvar(tel, { tentativas: 0, bloqueadoAte: null });
    return false;
  }

  function tempoRestante(tel) {
    const dados = _getDados(tel);
    if (!dados.bloqueadoAte) return 0;
    const restante = dados.bloqueadoAte - Date.now();
    return restante > 0 ? Math.ceil(restante / 60000) : 0;
  }

  function registrarFalha(tel) {
    const dados = _getDados(tel);
    dados.tentativas += 1;
    if (dados.tentativas >= MAX_TENTATIVAS) {
      dados.bloqueadoAte = Date.now() + BLOQUEIO_MS;
    }
    _salvar(tel, dados);
    return MAX_TENTATIVAS - dados.tentativas;
  }

  function resetar(tel) {
    localStorage.removeItem(_chave(tel));
  }

  return { estaBloqueado, tempoRestante, registrarFalha, resetar };
})();

async function hashSenha(senha) {
  const encoder = new TextEncoder();
  const data = encoder.encode(senha);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}  

function formatMoney(v) {
  return 'R$ ' + Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function showMsg(msg, type='error') {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = `auth-msg auth-msg--${type}`;
  el.style.display = 'block';
}

// ── AUTH ──
const Auth = (() => {
  function showTab(tab) {
    document.getElementById('formLogin').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('formCadastro').style.display = tab === 'cadastro' ? 'block' : 'none';
    document.getElementById('authMsg').style.display = 'none';
    document.querySelectorAll('.auth-tab').forEach((t,i) => {
      t.classList.toggle('is-active', (i===0 && tab==='login') || (i===1 && tab==='cadastro'));
    });
  }

  async function cadastrar() {
    const nome  = document.getElementById('cadNome').value.trim();
    const tel   = document.getElementById('cadTel').value.trim();
    const end   = document.getElementById('cadEnd').value.trim();
    const senha = document.getElementById('cadSenha').value;

    // Limpa erros
    ['errCadNome','errCadTel','errCadEnd','errCadSenha'].forEach(id => document.getElementById(id).textContent = '');
    document.getElementById('authMsg').style.display = 'none';

    let ok = true;
    if (!nome) { document.getElementById('errCadNome').textContent = 'Nome é obrigatório'; ok = false; }
    if (!validarTelefone(tel)) { document.getElementById('errCadTel').textContent = 'Telefone inválido'; ok = false; }
    if (!end) { document.getElementById('errCadEnd').textContent = 'Endereço é obrigatório'; ok = false; }
    if (senha.length < 6) { document.getElementById('errCadSenha').textContent = 'Mínimo 6 caracteres'; ok = false; }
    if (!ok) return;

    const empresa = document.getElementById('cadEmpresa').value.trim();
const cpf = document.getElementById('cadCpf').value.trim();

if (cpf && cpf.length !== 3) {
  document.getElementById('errCadCpf').textContent = 'Digite exatamente 3 dígitos';
  return;
}

const senhaHash = await hashSenha(senha);

const { error } = await _sb.from('clientes_loja').insert({ 
  nome, 
  telefone: tel, 
  endereco: end, 
  senha: senhaHash,
  empresa: empresa || null,
  cpf_iniciais: cpf || null
});
    
    if (error) {
      if (error.message.includes('unique')) showMsg('Este telefone já está cadastrado.');
      else showMsg('Erro ao criar conta: ' + error.message);
      return;
    }
    showMsg('Conta criada com sucesso! Faça login.', 'success');
    showTab('login');
    document.getElementById('loginTel').value = tel;
  }

  async function login() {
    const tel   = document.getElementById('loginTel').value.trim();
    const senha = document.getElementById('loginSenha').value;
    document.getElementById('errLoginTel').textContent = '';
    document.getElementById('authMsg').style.display = 'none';

    if (!validarTelefone(tel)) { document.getElementById('errLoginTel').textContent = 'Telefone inválido'; return; }
    if (!senha) { showMsg('Digite sua senha.'); return; }

    // Verifica bloqueio
    if (RateLimit.estaBloqueado(tel)) {
      const mins = RateLimit.tempoRestante(tel);
      showMsg(`🔒 Muitas tentativas. Tente novamente em ${mins} minuto(s).`);
      return;
    }

    const senhaHash = await hashSenha(senha);
    const { data, error } = await _sb.from('clientes_loja').select('*').eq('telefone', tel).eq('senha', senhaHash).single();

    if (error || !data) {
      const restantes = RateLimit.registrarFalha(tel);
      if (restantes <= 0) {
        showMsg('🔒 Conta bloqueada por 20 minutos após muitas tentativas incorretas.');
      } else {
        showMsg(`Telefone ou senha incorretos. ${restantes} tentativa(s) restante(s).`);
      }
      return;
    }

    RateLimit.resetar(tel);
    _cliente = data;
    localStorage.setItem('loja_cliente', JSON.stringify(data));
    entrarNaLoja();
  }

  function logout() {
    _cliente = null;
    _carrinho = [];
    localStorage.removeItem('loja_cliente');
    localStorage.removeItem('loja_carrinho');
    document.getElementById('lojaWrap').style.display = 'none';
    document.getElementById('authWrap').style.display = 'flex';
    Carrinho.atualizarBadge();
  }

  return { showTab, cadastrar, login, logout };
})();

// ── PRODUTOS ──
const Produtos = (() => {
  let _todos = [];

  async function carregar() {
    const { data, error } = await _sb.from('produtos').select('*').eq('disponivel', true).order('criado_em', { ascending: false });
    const grid = document.getElementById('produtosGrid');
    if (error || !data || data.length === 0) {
      grid.innerHTML = '<div class="empty-state">Nenhum produto disponível no momento.</div>';
      return;
    }
    _todos = data;
    _renderizar(_todos);
  }

  async function carregarCategorias() {
  const sel = document.getElementById('filtroCategorias');
  if (!sel) return;
  const { data } = await _sb.from('categorias').select('nome').order('ordem');
  if (!data) return;
  data.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.nome;
    opt.textContent = cat.nome;
    sel.appendChild(opt);
  });
}

function filtrarCategoria(categoria) {
  const busca = document.getElementById('buscaProdutos').value.toLowerCase();
  const cards = document.querySelectorAll('.produto-card');
  cards.forEach(card => {
    const nome = card.dataset.nome || '';
    const cat  = card.dataset.categoria || '';
    const matchBusca = nome.includes(busca);
    const matchCat   = !categoria || cat === categoria;
    card.style.display = matchBusca && matchCat ? '' : 'none';
  });
}

  function buscar(termo) {
    const t = termo.toLowerCase().trim();
    const filtrados = t
      ? _todos.filter(p => p.nome.toLowerCase().includes(t) || (p.descricao || '').toLowerCase().includes(t))
      : _todos;

    const grid = document.getElementById('produtosGrid');
    if (filtrados.length === 0) {
      grid.innerHTML = '<div class="empty-state">Nenhum produto encontrado.</div>';
      return;
    }
    _renderizar(filtrados);
  }

  function _renderizar(lista) {
    document.getElementById('produtosGrid').innerHTML = lista.map(p => `
      <div class="produto-card" data-nome="${p.nome.toLowerCase()}" data-categoria="${p.categoria || ''}">
        <div class="produto-card__img">
          ${p.imagem_url ? `<img src="${p.imagem_url}" alt="${p.nome}" onerror="this.parentElement.innerHTML='🛍️'"/>` : '🛍️'}
        </div>
        <div class="produto-card__body">
          <div class="produto-card__nome">${p.nome}</div>
          ${p.descricao ? `<div class="produto-card__desc">${p.descricao}</div>` : ''}
          <div class="produto-card__preco">${formatMoney(p.preco)}</div>
          <div class="produto-qty-control">
            <span class="produto-qty-label">Quantidade:</span>
            <button class="qty-btn" onclick="this.parentElement.querySelector('.produto-qty-num').textContent = Math.max(1, Number(this.parentElement.querySelector('.produto-qty-num').textContent) - 1)">−</button>
            <span class="produto-qty-num">1</span>
            <button class="qty-btn" onclick="this.parentElement.querySelector('.produto-qty-num').textContent = Number(this.parentElement.querySelector('.produto-qty-num').textContent) + 1">+</button>
          </div>
          <button class="btn--add" onclick='Carrinho.adicionar(${JSON.stringify(p)}, Number(this.previousElementSibling.querySelector(".produto-qty-num").textContent))'>+ Adicionar</button>
        </div>
      </div>`).join('');
  }

  return { carregar, buscar, carregarCategorias, filtrarCategoria };
})();

// ── CARRINHO ──
const Carrinho = (() => {
  function adicionar(produto, qty = 1) {
    const idx = _carrinho.findIndex(i => i.id === produto.id);
    if (idx >= 0) _carrinho[idx].qty += qty;
    else _carrinho.push({ ...produto, qty });
    _salvarCarrinho();
    atualizarBadge();
    renderizar();
  }

  function remover(id) {
    _carrinho = _carrinho.filter(i => i.id !== id);
    _salvarCarrinho();
    atualizarBadge();
    renderizar();
  }

  function alterarQty(id, delta) {
    const idx = _carrinho.findIndex(i => i.id === id);
    if (idx < 0) return;
    _carrinho[idx].qty = Math.max(1, _carrinho[idx].qty + delta);
    _salvarCarrinho();
    atualizarBadge();
    renderizar();
  }

  function _salvarCarrinho() {
    localStorage.setItem('loja_carrinho', JSON.stringify(_carrinho));
  }

  function atualizarBadge() {
    const total = _carrinho.reduce((s, i) => s + i.qty, 0);
    document.getElementById('carrinhoBadge').textContent = total;
  }

  function renderizar() {
    const body = document.getElementById('carrinhoBody');
    if (_carrinho.length === 0) {
      body.innerHTML = '<div class="empty-state">Seu carrinho está vazio.</div>';
      return;
    }
    const total = _carrinho.reduce((s, i) => s + i.preco * i.qty, 0);
    body.innerHTML = _carrinho.map(item => `
      <div class="carrinho-item">
        <div class="carrinho-item__foto">
          ${item.imagem_url
            ? `<img src="${item.imagem_url}" alt="${item.nome}" onerror="this.parentElement.innerHTML='🛍️'"/>`
            : '🛍️'}
        </div>
        <div style="flex:1">
          <div class="carrinho-item__nome">${item.nome}</div>
          <div class="carrinho-item__preco">${formatMoney(item.preco)} cada</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="Carrinho.alterarQty('${item.id}', -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="Carrinho.alterarQty('${item.id}', 1)">+</button>
        </div>
        <div style="min-width:80px;text-align:right;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold)">
          ${formatMoney(item.preco * item.qty)}
        </div>
        <button onclick="Carrinho.remover('${item.id}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px">✕</button>
      </div>`).join('') +
      `<div class="carrinho-total">Total: ${formatMoney(total)}</div>`;
  }

  function abrir() {
    renderizar();
    document.getElementById('modalCarrinho').classList.add('is-open');
  }

  function fechar() {
    document.getElementById('modalCarrinho').classList.remove('is-open');
  }

  function finalizar() {
    if (_carrinho.length === 0) return;
    fechar();
    Pedido.mostrarConfirmacao();
  }

  return { adicionar, remover, alterarQty, atualizarBadge, renderizar, abrir, fechar, finalizar };
})();

const Pedido = (() => {

      <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);text-align:right;padding-top:12px;">

      </div>
      <div style="margin-top:16px;padding:12px;background:var(--bg-raised);border-radius:8px;font-size:12px;color:var(--text-secondary)">
        📍 Entrega em: <strong style="color:var(--text-primary)">${_cliente.endereco}</strong>

      ${_cliente.cpf_iniciais ? `<br>🪪 CPF (iniciais): <strong style="color:var(--text-primary)">${_cliente.cpf_iniciais}</strong>` : ''}

  `*Itens:*\n` +

  `\n\n*Total: ${formatMoney(total)}*`
);

    alert('✅ Pedido enviado com sucesso! Aguarde a confirmação.');
  }

  return { mostrarConfirmacao, confirmar };
})();

const Historico = (() => {

    body.innerHTML = data.map(p => {

      return `

  return { abrir, fechar };

// ── BOOT ──
function entrarNaLoja() {
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('lojaWrap').style.display = 'flex';
  document.getElementById('lojaUser').textContent = '👤 ' + _cliente.nome;
  Produtos.carregar();

}

// Recupera sessão ao recarregar
(function restaurarSessao() {
  const salvo = localStorage.getItem('loja_cliente');
  if (salvo) {
    try {
      _cliente = JSON.parse(salvo);

      const carrinhoSalvo = localStorage.getItem('loja_carrinho');
      if (carrinhoSalvo) {
        _carrinho = JSON.parse(carrinhoSalvo);
      }

      entrarNaLoja();
      Carrinho.atualizarBadge();
    } catch (e) {
      localStorage.removeItem('loja_cliente');
      localStorage.removeItem('loja_carrinho');
    }
  }
})();
